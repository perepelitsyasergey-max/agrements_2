<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Вхід в OmniCore</title>
  </head>
  <body>
    <h2>Вхід у систему</h2>
    <form action="/login" method="POST">
      <p>
        Email (Логін): <input type="email" name="input_user_email" required />
      </p>
      <p>
        Пароль: <input type="password" name="input_user_password" required />
      </p>
      <button type="submit">Увійти</button>
    </form>
  </body>
</html>
